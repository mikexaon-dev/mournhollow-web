# Render Blueprint — เปิด render.com แล้ว New > Blueprint ชี้มาที่ repo นี้
services:
  - type: web
    name: mournhollow
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: GEMINI_API_KEY      # ใส่ค่าจริงในหน้า Render (อย่า commit ลงโค้ด)
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: 3.12.6
